<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>대산 적재 AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #48BB78;
      --primary-dark: #123628;
      --primary-hover: #38A169;
      --background: #F1F5F0;
      --surface: #FFFFFF;
      --gradient-header: linear-gradient(135deg, #123628 0%, #1A4A35 100%);
      --gradient-cta: linear-gradient(135deg, #48BB78, #38A169);
      --danger: #ef4444;
      --danger-soft: #fff3f1;
      --warning: #f59e0b;
      --ink: #183026;
      --muted: #64756d;
      --line: rgba(18, 54, 40, 0.12);
      --glass-bg: rgba(255, 255, 255, 0.72);
      --glass-bg-heavy: rgba(255, 255, 255, 0.88);
      --glass-border: rgba(255, 255, 255, 0.45);
      --glass-blur: 16px;
      --shadow-glow: 0 0 20px rgba(72, 187, 120, 0.25);
      --shadow-card: 0 24px 50px rgba(18, 54, 40, 0.08);
      --transition-normal: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --header-height: 48px;
      --panel-left-width: 280px;
      --panel-right-width: 260px;
      /* New Visualizer Colors */
      --viz-bg: #0d1b2a;
      --viz-grid: rgba(30, 58, 95, 0.4);
      --viz-l1: #c0392b;
      --viz-l2: #e74c3c;
      --viz-sheet: #e67e22;
      --viz-select: #fbbf24;
      --viz-safe: #22c55e;
      --viz-caution: #f59e0b;
      --viz-danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(72, 187, 120, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(26, 74, 53, 0.16), transparent 26%),
        var(--background);
    }
    .app-shell {
      height: 100vh;
      display: grid;
      grid-template-rows: var(--header-height) 1fr;
      overflow: hidden;
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
      background: var(--gradient-header);
      color: white;
      box-shadow: 0 16px 30px rgba(18, 54, 40, 0.24);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 16px rgba(72, 187, 120, 0.9);
    }
    .header-actions {
      display: flex;
      gap: 10px;
    }
    .header-actions a, .header-actions button {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.12);
      color: white;
      border-radius: 999px;
      padding: 8px 14px;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition-normal);
    }
    .header-actions button[disabled] {
      opacity: .48;
      cursor: not-allowed;
    }
    .workspace {
      display: grid;
      grid-template-columns: var(--panel-left-width) minmax(0, 1fr) var(--panel-right-width);
      gap: 16px;
      padding: 16px;
      min-height: 0;
      overflow: auto;
    }
    .panel {
      min-height: 0;
      border-radius: 28px;
      background: var(--glass-bg-heavy);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(var(--glass-blur));
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }
    .panel-scroll {
      height: 100%;
      overflow: auto;
      padding: 22px;
    }
    .section-label {
      font-size: .78rem;
      color: var(--primary-hover);
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .section-title {
      margin: 0;
      font-size: 1.3rem;
      letter-spacing: -0.03em;
    }
    .section-copy {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }
    .field, .order-card, .status-card, .result-card, .risk-row, .sequence-item, .viz-card, .manual-box, .empty-state {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 12px 28px rgba(18, 54, 40, 0.04);
    }
    .field {
      padding: 14px;
      margin-top: 14px;
    }
    .field select, .field input {
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--line);
      padding: 13px 14px;
      font: inherit;
      background: #f8fbf8;
      color: var(--ink);
    }
    .split {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 110px;
      margin-top: 14px;
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      background: white;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
      transition: var(--transition-normal);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-cta {
      flex: 1;
      border: none;
      color: white;
      background: var(--gradient-cta);
      box-shadow: var(--shadow-glow);
      font-weight: 700;
      padding: 15px 16px;
    }
    .btn-secondary {
      background: linear-gradient(180deg, #ffffff, #f6faf6);
    }
      gap: 8px;
    }
    .diagram-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .diagram-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .diagram-box span {
      font-size: 10px;
      color: #64748b;
      font-weight: 600;
    }
    .diagram-box svg {
      width: 100%;
      height: auto;
      max-height: 200px;
    }
    .order-list, .result-list, .risk-list, .sequence-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .order-card {
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }
    .order-title {
      font-weight: 600;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .order-sub {
      color: var(--muted);
      font-size: .9rem;
      margin-top: 4px;
    }
    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      border: 1px solid rgba(239, 68, 68, .2);
      background: var(--danger-soft);
      color: var(--danger);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    .status-card, .result-card, .manual-box {
      padding: 16px;
    }
    .result-hero {
      background: var(--gradient-header);
      border: none;
      color: white;
    }
    .result-hero .muted,
    .result-hero strong {
      color: white;
    }
    .status-grid, .result-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, 1fr);
      margin-top: 16px;
    }
    .result-title {
      font-size: 11px;
      color: rgba(255,255,255,.8);
      margin-bottom: 8px;
    }
    .vehicle-breakdown, .result-meta, .risk-list, .sequence-list {
      display: grid;
      gap: 8px;
    }
    .vehicle-row, .meta-row, .risk-row, .sequence-item {
      font-size: 11px;
    }
    .vehicle-row, .meta-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }
    .vehicle-row:last-child, .meta-row:last-child {
      border-bottom: 0;
    }
    .weight-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: white;
      font-size: 11px;
      font-weight: 700;
    }
    .vehicle-weight {
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    .vehicle-total {
      font-size: 14px;
      font-weight: 700;
    }
    .status-card strong, .result-card strong {
      display: block;
      margin-top: 8px;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
    }
    .muted { color: var(--muted); }
    .panel-divider {
      height: 1px;
      background: var(--line);
      margin: 16px 0;
    }
    .center-panel {
      display: flex !important;
      flex-direction: column !important;
      min-width: 0;
      overflow-y: auto !important; /* Force scrolling if content overflows */
      flex: 1;
    }
    .canvas-header {
      padding: 16px 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .view-tabs, .mobile-nav {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(18, 54, 40, 0.06);
    }
    .view-tabs button, .mobile-nav button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      cursor: pointer;
      transition: var(--transition-normal);
    }
    .view-tabs button.active, .mobile-nav button.active {
      background: white;
      color: var(--primary-dark);
      box-shadow: 0 10px 20px rgba(18, 54, 40, 0.1);
      font-weight: 700;
    }
    
    /* Updated Vehicle Tabs Style */
    .vehicle-selector-bar {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      flex-shrink: 0;
      z-index: 100;
    }
    .vehicle-selector-bar::-webkit-scrollbar { display: none; }
    .v-tab {
      padding: 10px 20px;
      background: #f1f5f9;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .v-tab:hover { background: #e2e8f0; color: var(--primary-dark); }
    .v-tab.active {
      background: var(--primary-dark);
      color: #fff;
      border-color: var(--primary-dark);
      box-shadow: 0 4px 12px rgba(18, 54, 40, 0.2);
    }
    .canvas-area {
      padding: 0;
      overflow: hidden;
      position: relative;
      background: var(--viz-bg);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .viz-container {
      position: relative;
      width: 100%;
      flex: 1;
      cursor: crosshair;
    }
    .viz-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Floating Control Buttons */
    .viz-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 50;
    }
    .viz-btn-group {
      display: flex;
      flex-direction: column;
      background: rgba(22, 33, 62, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .viz-btn {
      width: 52px;
      height: 52px;
      border: 0;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
    }
    .viz-btn .icon { font-size: 16px; margin-bottom: 2px; }
    .viz-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .viz-btn.active { background: var(--primary); color: #fff; }
    
    /* Layer Filter Badge on Button */
    .layer-badge { font-size: 9px; opacity: 0.8; }

    /* Bottom Info Bar */
    .viz-footer {
      background: rgba(13, 27, 42, 0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 12px 20px;
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr;
      gap: 20px;
      font-size: 12px;
      color: #fff;
      backdrop-filter: blur(10px);
    }
    .viz-footer-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .viz-footer-label { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 600; text-transform: uppercase; }
    .viz-footer-val { font-weight: 700; font-size: 13px; }
    
    /* Tooltip */
    .viz-tooltip {
      position: fixed;
      pointer-events: none;
      background: #1e293b;
      color: #fff;
      padding: 10px;
      border-radius: 8px;
      font-size: 11px;
      z-index: 1000;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
      display: none;
      min-width: 140px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .viz-tooltip strong { display: block; margin-bottom: 4px; font-size: 12px; color: var(--primary); }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .82rem;
      font-weight: 700;
      color: white;
      font-size: 11px;
    }
    .manual-box {
      margin-top: 14px;
      line-height: 1.65;
      color: var(--ink);
      background: white !important;
      border-left: 5px solid var(--primary);
      font-size: 11px;
    }
    .risk-row, .sequence-item {
      padding: 13px 14px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }
    .sequence-meta {
      color: var(--muted);
      font-size: .88rem;
      margin-top: 4px;
    }
    .empty-state {
      min-height: 320px;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.8;
    }
    .mobile-nav {
      display: none;
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      z-index: 110;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.65);
      box-shadow: 0 16px 30px rgba(18, 54, 40, 0.16);
    }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 22px;
      z-index: 120;
      background: #132b20;
      color: white;
      padding: 14px 16px;
      border-radius: 16px;
      box-shadow: 0 16px 30px rgba(18, 54, 40, 0.18);
      display: none;
    }
    .toast.show { display: block; }
    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 280px minmax(0, 1fr) 260px;
      }
    }
    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }
      .panel-scroll {
        height: auto;
        max-height: none;
      }
      .left-panel, .right-panel, .center-panel {
        display: none;
      }
      .left-panel.mobile-active, .right-panel.mobile-active, .center-panel.mobile-active {
        display: block;
      }
      .mobile-nav { display: inline-flex; }
      .canvas-header { padding-top: 20px; }
      .status-grid, .result-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>대산 적재 AI</span>
      </div>
      <div class="header-actions">
        <a href="{{ url_for('history') }}">이력 조회</a>
        <button type="button" id="pdfButton" disabled>PDF 출력</button>
      </div>
    </header>

    <main class="workspace">
      <aside class="panel left-panel mobile-active" data-mobile-panel="input">
        <div class="panel-scroll">
          <div class="field">
            <select id="materialSelect">
              <option value="">자재를 선택하십시오</option>
              {% for option in material_options %}
                <option value="{{ option }}">{{ option }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="split">
            <div class="field" style="margin-top:0;">
              <input id="quantityInput" type="number" min="1" placeholder="수량 입력">
            </div>
            <div class="field" style="margin-top:0;">
              <button class="btn btn-secondary" type="button" id="addOrderButton">+ 자재 추가</button>
            </div>
          </div>

          <div class="panel-divider"></div>
          <div class="order-list" id="orderList"></div>

          <div class="panel-divider"></div>

          <div class="field" style="margin-top:0;">
            <select id="vehicleSelect">
              <option value="auto">자동선택</option>
            </select>
          </div>

          <div class="panel-divider"></div>
          <div class="button-row">
            <button class="btn btn-cta" type="button" id="runButton">최적 배차 실행</button>
            <button class="btn btn-secondary" type="button" id="resetButton" style="width:100px; font-weight:600;">초기화</button>
          </div>
        </div>
      </aside>

      <section class="panel center-panel mobile-active" data-mobile-panel="visual">
        <!-- 상단 차량 선택 탭 (이전 위치: 캔버스 내부 -> 현재 위치: 패널 최상단 제어 바) -->
        <div id="vehicleTabs" class="vehicle-selector-bar" style="display:none;"></div>

        <!-- 외부 래퍼: flex:1 → 패널 전체 높이 채움 -->
        <div style="flex:1;min-height:420px;position:relative">
          <!-- 캔버스+인포바 내부 -->
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;background:#0d1b2a;border-bottom-left-radius:10px;border-bottom-right-radius:10px;overflow:visible">
            <div id="viz-label" style="position:absolute;left:15px;top:15px;background:rgba(0,0,0,0.6);color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;z-index:20;pointer-events:none">ISO View</div>

            <canvas id="viz-canvas" style="flex:1;width:100%;display:block;cursor:grab;background:#0d1b2a;border-radius:10px 10px 0 0"></canvas>

            <div id="viz-tip" style="display:none;position:absolute;background:rgba(26,32,44,0.95);color:#fff;padding:8px 12px;border-radius:8px;font-size:11px;z-index:999;pointer-events:none;border:1px solid rgba(255,255,255,0.2);box-shadow:0 10px 20px rgba(0,0,0,0.5)"></div>

            <div id="vizEmpty" class="empty-state" style="position:absolute;inset:0;z-index:10;background:rgba(13,27,42,0.85);backdrop-filter:blur(8px);display:grid;place-items:center;color:#fff;text-align:center">
              자재를 입력하고 `최적 배차 실행`을 누르면<br>통합 시각화 엔진이 구동됩니다.
            </div>

            <div id="info-bar" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;background:#0a1628;border-top:1px solid #1e3a5f;padding:8px 12px;flex-shrink:0">
              <div style="padding:0 4px">
                <div style="font-size:9px;color:#475569">선택 팔레트</div>
                <div id="viz-sel-info" style="font-size:12px;font-weight:500;color:#e2e8f0">—</div>
              </div>

              <div style="padding:0 4px;text-align:center;border-left:1px solid #1e3a5f">
                <div style="font-size:9px;color:#475569">적재율</div>
                <div id="viz-util" style="font-size:14px;font-weight:500;color:#3b82f6">—</div>
              </div>

              <div style="padding:0 4px;text-align:center;border-left:1px solid #1e3a5f">
                <div style="font-size:9px;color:#475569">COG (종/횡)</div>
                <div id="viz-cog" style="font-size:14px;font-weight:500;color:#22c55e">—</div>
              </div>

              <div style="padding:0 4px;text-align:center;border-left:1px solid #1e3a5f">
                <div style="font-size:9px;color:#475569">위험 건수</div>
                <div id="viz-risk-count" style="font-size:14px;font-weight:500;color:#f59e0b">—</div>
              </div>
            </div>
          </div><!-- /내부 clip div -->

          <!-- 우측 플로팅 버튼: 외부 래퍼 기준 absolute → overflow:hidden에 잘리지 않음 -->
          <div style="position:absolute;right:10px;top:10px;display:flex;flex-direction:column;gap:6px;z-index:30">
            <div class="viz-btn-group" style="display:flex;flex-direction:column;background:rgba(22,33,62,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;box-shadow:0 8px 16px rgba(0,0,0,0.4)">
              <button class="viz-btn active" data-action="view" data-val="iso" style="padding:10px;border:0;background:transparent;color:#fff;font-size:10px;font-weight:700;cursor:pointer">ISO</button>
              <button class="viz-btn" data-action="view" data-val="top" style="padding:10px;border:0;background:transparent;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;cursor:pointer">TOP</button>
              <button class="viz-btn" data-action="view" data-val="side" style="padding:10px;border:0;background:transparent;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;cursor:pointer">SIDE</button>
            </div>
            <div style="height:1px;background:rgba(255,255,255,0.2);margin:2px 0"></div>
            <div class="viz-btn-group" style="display:flex;flex-direction:column;background:rgba(22,33,62,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;box-shadow:0 8px 16px rgba(0,0,0,0.4)">
              <button class="viz-btn" data-action="toggle" data-val="risk" style="padding:10px;border:0;background:transparent;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;cursor:pointer">위험도⚠️</button>
              <button class="viz-btn" data-action="toggle" data-val="weight" style="padding:10px;border:0;background:transparent;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;cursor:pointer">중량분포</button>
            </div>
            <div style="height:1px;background:rgba(255,255,255,0.2);margin:2px 0"></div>
            <div class="viz-btn-group" style="display:flex;flex-direction:column;background:rgba(22,33,62,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;box-shadow:0 8px 16px rgba(0,0,0,0.4)">
              <button class="viz-btn active" data-action="filter" data-val="all" style="padding:10px;border:0;background:transparent;color:#fff;font-size:10px;font-weight:700;cursor:pointer">전체</button>
              <button class="viz-btn" data-action="filter" data-val="1" style="padding:10px;border:0;background:transparent;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;cursor:pointer">1층</button>
              <button class="viz-btn" data-action="filter" data-val="2" style="padding:10px;border:0;background:transparent;color:rgba(255,255,255,0.6);font-size:10px;font-weight:700;cursor:pointer">2층</button>
            </div>
          </div><!-- /버튼 컬럼 -->

        </div><!-- /외부 래퍼 -->
      </section>

      <aside class="panel right-panel mobile-active" data-mobile-panel="result">
        <div class="panel-scroll">
          <h2 class="section-title">배차 결과</h2>
          <div class="result-list">
            <div class="result-card result-hero">
              <div class="result-title">차량 조합</div>
              <div class="vehicle-breakdown" id="vehicleBreakdown"></div>
              <div class="result-meta" id="resultMeta" style="margin-top:10px;"></div>
            </div>

            <div class="result-card">
              <div style="font-size:11px; color:var(--muted);">최종 판정</div>
              <div style="margin-top:10px;">
                <span class="badge" id="riskBadge" style="background:#94a3b8;">Pending</span>
              </div>
            </div>

            <div class="result-card">
              <div style="font-size:11px; color:var(--muted);">항목별 위험도</div>
              <div class="risk-list" id="riskList"></div>
            </div>

            <div class="manual-box" id="manualBox" style="background:#123628;">
              현장 매뉴얼이 여기에 표시됩니다.
            </div>

            <div class="result-card">
              <div style="font-size:11px; color:var(--muted);">적재 순서</div>
              <div class="sequence-list" id="sequenceList"></div>

    <nav class="mobile-nav" id="mobileNav">
      <button class="active" data-target="input" type="button">입력</button>
      <button data-target="visual" type="button">시각화</button>
      <button data-target="result" type="button">결과</button>
    </nav>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    const state = {
      orders: [],
      materialOptions: {{ material_options | tojson }},
      lastResult: null,
      engine: null
    };

    const VisualizerEngine = {
      canvas: null,
      ctx: null,
      items: [],
      vehicle: { cols: 6, rows: 2, length: 1, width: 1 },
      summary: {},
      view: 'iso',
      showRisk: false,
      showWeight: false,
      layerFilter: 'all',
      yaw: Math.PI / 6,
      hoveredId: null,
      selectedId: null,
      isDragging: false,
      lastMouseX: 0,
      hitBoxes: [],

      init(data = null) {
        this.canvas = document.getElementById('viz-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        window.addEventListener('resize', () => this.resize());
        this.resize();
        
        this.canvas.addEventListener('mousedown', (e) => this.onMouseDown(e));
        window.addEventListener('mousemove', (e) => this.onMouseMove(e));
        window.addEventListener('mouseup', () => this.onMouseUp());
        this.canvas.addEventListener('mouseleave', () => {
          this.hoveredId = null;
          document.getElementById('viz-tip').style.display = 'none';
        });
        
        if (data) this.setData(data);
        this.animate();
      },

      resize() {
        if (!this.canvas) return;
        const w = this.canvas.clientWidth;
        const h = this.canvas.clientHeight;
        if (!w || !h) return;
        this.width = w;
        this.height = h;
        this.canvas.width = w * window.devicePixelRatio;
        this.canvas.height = h * window.devicePixelRatio;
        this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
      },

      setData(data) {
        this.items = data.packed_items || [];
        this.vehicle = data.vehicle || { cols: 6, rows: 2 };
        this.summary = data.summary || {};
        this.selectedId = null;
        this.updateFooter();
        const emptyEl = document.getElementById('vizEmpty');
        if (emptyEl) emptyEl.style.display = 'none';
      },

      onMouseDown(e) {
        if (this.view === 'iso') {
          this.isDragging = true;
          this.lastMouseX = e.clientX;
        }
        if (this.hoveredId !== null) {
          this.selectedId = this.hoveredId;
          this.updateFooter();
        }
      },

      onMouseMove(e) {
        if (!this.canvas) return;
        const rect = this.canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        if (this.isDragging) {
          const deltaX = e.clientX - this.lastMouseX;
          this.yaw += deltaX * 0.005;
          const minYaw = 0.17; // ~10 deg
          const maxYaw = 0.78; // ~45 deg
          if (this.yaw < minYaw) this.yaw = minYaw;
          if (this.yaw > maxYaw) this.yaw = maxYaw;
          this.lastMouseX = e.clientX;
        }
        
        this.checkHover(mx, my);
        this.updateTooltip(e.clientX, e.clientY);
      },

      onMouseUp() { this.isDragging = false; },

      checkHover(mx, my) {
        this.hoveredId = null;
        for (let i = this.hitBoxes.length - 1; i >= 0; i--) {
          const hb = this.hitBoxes[i];
          if (mx >= hb.x && mx <= hb.x + hb.w && my >= hb.y && my <= hb.y + hb.h) {
            this.hoveredId = hb.id;
            break;
          }
        }
      },

      updateTooltip(x, y) {
        const tooltip = document.getElementById('viz-tip');
        if (!tooltip) return;
        if (this.hoveredId === null) {
          tooltip.style.display = 'none';
          return;
        }
        const item = this.items.find(i => i.id === this.hoveredId);
        if (!item) return;

        let badges = '';
        if (item.is_rear_entry) {
            badges += '<div style="margin-top:8px;padding:4px 8px;background:#f59e0b;color:#000;border-radius:4px;font-weight:700;font-size:10px;display:inline-block">⚠️ 후면 진입 적재</div>';
        }

        tooltip.style.display = 'block';
        tooltip.style.left = (x + 15) + 'px';
        tooltip.style.top = (y + 15) + 'px';
        tooltip.innerHTML = `
            No. ${item.id} (${item.layer}층)<br>
            수량: ${item.qty} ${item.unit}<br>
            무게: ${item.weight.toLocaleString()}kg<br>
            상태: <span style="color:${item.risk_level === 0 ? '#22c55e' : '#ef4444'}">${item.risk_level === 0 ? 'Safe' : 'Caution'}</span>
          </div>
        `;
      },

      updateFooter() {
        const sel = this.items.find(i => i.id === this.selectedId);
        const lSel = document.getElementById('viz-sel-info');
        const lUtil = document.getElementById('viz-util');
        const lCog = document.getElementById('viz-cog');
        const lRisk = document.getElementById('viz-risk-count');

        if (lSel) lSel.textContent = sel ? `${sel.layer}층 / No.${sel.id} / ${sel.qty}장` : '—';
        if (lUtil) {
          lUtil.textContent = this.summary.utilization !== undefined ? `${this.summary.utilization.toFixed(1)}%` : '—';
        }
        if (lCog) {
          const hasCog = this.summary.cog_fr !== undefined && this.summary.cog_lr !== undefined;
          lCog.textContent = hasCog ? `${this.summary.cog_fr.toFixed(1)}% / ${this.summary.cog_lr.toFixed(1)}%` : '—';
        }
        if (lRisk) lRisk.textContent = `${this.summary.risk_count || 0}건`;
      },

      animate() {
        this.draw();
        requestAnimationFrame(() => this.animate());
      },

      getColor(item) {
        if (item.id === this.selectedId || item.id === this.hoveredId) return '#fbbf24';
        if (this.showWeight) {
          const ratio = Math.min(item.weight / 2500, 1);
          return this.interpolateColor('#dbeafe', '#1e3a8a', ratio);
        }
        if (this.layerFilter !== 'all' && item.layer != this.layerFilter) return '#334155';
        
        if (item.unit === 'sheet') return '#e67e22';
        return item.layer === 1 ? '#c0392b' : '#e74c3c';
      },

      interpolateColor(c1, c2, r) {
        const h2d = (h) => parseInt(h.slice(1), 16);
        const d2h = (d) => d.toString(16).padStart(2, '0');
        const v1 = h2d(c1), v2 = h2d(c2);
        const r1 = (v1 >> 16), g1 = (v1 >> 8) & 0xff, b1 = v1 & 0xff;
        const r2 = (v2 >> 16), g2 = (v2 >> 8) & 0xff, b2 = v2 & 0xff;
        return `#${d2h(Math.round(r1 + (r2-r1)*r))}${d2h(Math.round(g1 + (g2-g1)*r))}${d2h(Math.round(b1 + (b2-b1)*r))}`;
      },

      adjustColor(hex, amt) {
        const v = parseInt(hex.slice(1), 16);
        let r = (v >> 16) + amt, g = ((v >> 8) & 0xff) + amt, b = (v & 0xff) + amt;
        r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
        return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
      },

      draw() {
        if (!this.ctx) return;
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.width, this.height);
        this.hitBoxes = [];
        if (!this.items.length) return;

        if (this.view === 'iso') this.drawISO();
        else if (this.view === 'top') this.drawTOP();
        else if (this.view === 'side') this.drawSIDE();
      },

      drawISO() {
        const ctx = this.ctx;
        const s = 60, h = 40;
        
        // Calculate bounds for centering
        const yawCos = Math.cos(this.yaw);
        const yawSin = Math.sin(this.yaw);
        
        const minX = -this.vehicle.rows * s * yawCos;
        const maxX = this.vehicle.cols * s * yawCos;
        const minY = 0;
        const maxY = (this.vehicle.cols + this.vehicle.rows) * s * yawSin;
        
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;
        
        // Final screen center position
        const cx = this.width / 2 - centerX;
        const cy = this.height * 0.6 - centerY; 
        
        const sorted = [...this.items].sort((a, b) => (a.col + a.row) - (b.col + b.row));
        ctx.save();
        ctx.translate(cx, cy);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.setLineDash([5, 5]);
        for (let c = 0; c <= this.vehicle.cols; c++) {
          const p1 = this.isoProj(c, 0, s);
          const p2 = this.isoProj(c, this.vehicle.rows, s);
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }
        for (let r = 0; r <= this.vehicle.rows; r++) {
          const p1 = this.isoProj(0, r, s);
          const p2 = this.isoProj(this.vehicle.cols, r, s);
          ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
        }
        ctx.setLineDash([]);

        sorted.forEach(item => {
          const isFm = this.layerFilter === 'all' || item.layer == this.layerFilter;
          ctx.globalAlpha = isFm ? 1 : 0.1;
          const pos = this.isoProj(item.col, item.row, s);
          this.drawBox(pos.x, pos.y, s, h, item, cx, cy);
        });
        
        if (this.summary.cog_fr !== undefined) {
          const cogP = this.isoProj(this.vehicle.cols/2, this.vehicle.rows/2, s);
          ctx.fillStyle = '#ef4444';
          ctx.beginPath(); ctx.arc(cogP.x, cogP.y, 5, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
        ctx.globalAlpha = 1;
      },

      isoProj(c, r, s) {
        const x = (c - r) * s * Math.cos(this.yaw);
        const y = (c + r) * s * Math.sin(this.yaw);
        return { x, y };
      },

      drawBox(x, y, s, h, item, cx, cy) {
        const ctx = this.ctx;
        const bh = item.unit === 'sheet' ? h / 4 : h;
        const by = y - (item.layer - 1) * h;
        const color = this.getColor(item);
        const sw = s * Math.cos(this.yaw), sh = s * Math.sin(this.yaw);

        ctx.fillStyle = this.adjustColor(color, 20);
        ctx.beginPath();
        ctx.moveTo(x, by - bh);
        ctx.lineTo(x + sw, by - bh + sh);
        ctx.lineTo(x, by - bh + sh * 2);
        ctx.lineTo(x - sw, by - bh + sh);
        ctx.fill();
        
        ctx.fillStyle = this.adjustColor(color, -10);
        ctx.beginPath();
        ctx.moveTo(x, by - bh + sh * 2);
        ctx.lineTo(x + sw, by - bh + sh);
        ctx.lineTo(x + sw, by + sh);
        ctx.lineTo(x, by + sh * 2);
        ctx.fill();

        ctx.fillStyle = this.adjustColor(color, -30);
        ctx.beginPath();
        ctx.moveTo(x, by - bh + sh * 2);
        ctx.lineTo(x - sw, by - bh + sh);
        ctx.lineTo(x - sw, by + sh);
        ctx.lineTo(x, by + sh * 2);
        ctx.fill();

        if (item.unit === 'sheet') {
          ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.setLineDash([2,2]);
          ctx.beginPath(); ctx.moveTo(x-sw, by+sh); ctx.lineTo(x, by+sh*2); ctx.lineTo(x+sw, by+sh); ctx.stroke();
          ctx.setLineDash([]);
        }
        
        ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(item.id, x, by + sh - bh/2 + 4);

        this.hitBoxes.push({ id: item.id, x: x - sw + cx, y: by - bh + cy, w: sw*2, h: bh + sh*2 });
      },

      drawTOP() {
        const ctx = this.ctx;
        const pad = Math.min(36, this.height * 0.08);
        const cw = (this.width - pad * 2) / this.vehicle.cols;
        const ch = (this.height - pad * 2) / Math.max(1, this.vehicle.rows);
        const cy = pad;

        ctx.strokeStyle = '#334155'; ctx.setLineDash([8, 4]);
        ctx.strokeRect(pad, cy, cw * this.vehicle.cols, ch * this.vehicle.rows);
        ctx.setLineDash([]);

        this.items.forEach(item => {
          if (this.layerFilter !== 'all' && item.layer != this.layerFilter) return;
          if (this.layerFilter === 'all' && item.layer > 1) return;

          let x, y, bw, bh;
          
          if (item.is_rear_entry) {
            // 후면 진입은 폭방향(Lateral) 배치: x_mm이 길이방향, y_mm이 폭방향 중앙
            const scaleX = (this.width - pad * 2) / this.vehicle.cargo_length_mm;
            const scaleY = (this.height - pad * 2) / this.vehicle.cargo_width_mm;
            
            x = pad + (item.x_mm - 450) * scaleX; // 단변(900)의 절반
            y = cy + (this.vehicle.cargo_width_mm - item.y_mm - 900) * scaleY; // 장변(1800)의 절반
            bw = 900 * scaleX;
            bh = 1800 * scaleY;
          } else {
            x = pad + item.col * cw;
            y = cy + (this.vehicle.rows - 1 - item.row) * ch;
            bw = cw;
            bh = ch;
          }

          const color = this.getColor(item);
          ctx.fillStyle = color;
          this.roundRect(ctx, x + 5, y + 5, bw - 10, bh - 10, 8); ctx.fill();

          // 후면 진입 특수 테두리 (주황색 점선)
          if (item.is_rear_entry) {
            ctx.strokeStyle = '#f59e0b'; ctx.setLineDash([4, 2]); ctx.lineWidth = 2;
            this.roundRect(ctx, x + 5, y + 5, bw - 10, bh - 10, 8); ctx.stroke();
            ctx.setLineDash([]); ctx.lineWidth = 1;
          }

          if (item.unit === 'sheet') {
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.setLineDash([4, 4]);
            this.roundRect(ctx, x + 5, y + 5, cw - 10, ch - 10, 8); ctx.stroke();
            ctx.setLineDash([]);
          }

          ctx.fillStyle = '#fff'; 
          ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left'; ctx.fillText(item.id, x + 12, y + 42);
          ctx.font = '9px sans-serif'; ctx.textAlign = 'right'; ctx.fillText(`${item.qty}장`, x + cw - 12, y + 42);
          
          ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x + 12, y + ch - 18, cw - 24, 3);
          ctx.fillStyle = '#fff'; ctx.fillRect(x + 12, y + ch - 18, (item.weight / 2500) * (cw - 24), 3);

          this.hitBoxes.push({ id: item.id, x, y, w: cw, h: ch });
        });
      },

      drawSIDE() {
        const ctx = this.ctx;
        const pad = 60, cw = (this.width - pad*2) / this.vehicle.cols, ch = 90, floorY = this.height - 100;

        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(pad, floorY - ch); ctx.lineTo(this.width - pad, floorY - ch); ctx.stroke();
        ctx.setLineDash([]);
        
        [...this.items].sort((a,b) => a.layer - b.layer).forEach(item => {
          if (this.layerFilter !== 'all' && item.layer != this.layerFilter) return;

          let x, y, bw;
          if (item.is_rear_entry) {
            const scaleX = (this.width - pad * 2) / this.vehicle.cargo_length_mm;
            x = pad + (item.x_mm - 450) * scaleX;
            bw = 900 * scaleX;
          } else {
            x = pad + item.col * cw;
            bw = cw;
          }

          const vh = item.unit === 'sheet' ? ch * 0.3 : ch * 0.8;
          const y_pos = floorY - item.layer * ch + (ch - vh);
          const color = this.getColor(item);
          
          ctx.fillStyle = color;
          this.roundRect(ctx, x + 8, y_pos, bw - 16, vh, 6); ctx.fill();
          
          // 후면 진입 특수 테두리 (SIDE)
          if (item.is_rear_entry) {
            ctx.strokeStyle = '#f59e0b'; ctx.setLineDash([4, 2]); ctx.lineWidth = 2;
            this.roundRect(ctx, x + 8, y_pos, bw - 16, vh, 6); ctx.stroke();
            ctx.setLineDash([]); ctx.lineWidth = 1;
          }

          if (item.unit === 'sheet') {
            ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.setLineDash([4,4]);
            this.roundRect(ctx, x + 8, y_pos, bw - 16, vh, 6); ctx.stroke();
            ctx.setLineDash([]);
          }

          ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText(item.id, x + bw/2, y_pos + vh/2 + 4);
          this.hitBoxes.push({ id: item.id, x, y: y_pos, w: bw, h: vh });
        });
      },

      roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
      }
    };

    const elements = {
      materialSelect: document.getElementById('materialSelect'),
      quantityInput: document.getElementById('quantityInput'),
      addOrderButton: document.getElementById('addOrderButton'),
      orderList: document.getElementById('orderList'),
      runButton: document.getElementById('runButton'),
      resetButton: document.getElementById('resetButton'),
      vehicleSelect: document.getElementById('vehicleSelect'),
      pdfButton: document.getElementById('pdfButton'),
      vehicleBreakdown: document.getElementById('vehicleBreakdown'),
      resultMeta: document.getElementById('resultMeta'),
      riskBadge: document.getElementById('riskBadge'),
      riskList: document.getElementById('riskList'),
      manualBox: document.getElementById('manualBox'),
      sequenceList: document.getElementById('sequenceList'),
      toast: document.getElementById('toast'),
      vizEmpty: document.getElementById('vizEmpty'),
      diagramSection: document.getElementById('diagramSection'),
      vehicleTabs: document.getElementById('vehicleTabs')
    };

    function fmtInt(value) {
      return Number(value || 0).toLocaleString('ko-KR', { maximumFractionDigits: 0 });
    }

    function riskColor(level) {
      return {
        Safe: '#48BB78',
        Caution: '#EAB308',
        Danger: '#EF4444',
        Critical: '#EF4444',
      }[level] || '#94A3B8';
    }

    function showToast(message) {
      elements.toast.textContent = message;
      elements.toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        elements.toast.classList.remove('show');
      }, 2600);
    }

    function renderOrders() {
      elements.orderList.innerHTML = '';
      if (!state.orders.length) {
        elements.orderList.innerHTML = '<div class="empty-state" style="min-height:160px;">추가된 항목이 없습니다.<br>드롭다운과 수량 입력으로 품목을 담아주세요.</div>';
        return;
      }
      state.orders.forEach((order, index) => {
        const card = document.createElement('article');
        card.className = 'order-card';
        card.innerHTML = `
          <div>
            <div class="order-title">${order.material_key}</div>
            <div class="order-sub">수량 ${order.quantity}</div>
          </div>
          <button class="icon-btn" type="button" data-index="${index}">X</button>
        `;
        card.querySelector('button').addEventListener('click', () => {
          state.orders.splice(index, 1);
          renderOrders();
        });
        elements.orderList.appendChild(card);
      });
    }

    function addOrder() {
      const materialKey = elements.materialSelect.value.trim();
      const quantity = elements.quantityInput.value.trim();
      if (!materialKey || !/^\d+$/.test(quantity) || Number(quantity) <= 0) {
        showToast('자재와 수량을 올바르게 입력하십시오.');
        return;
      }
      state.orders.push({ material_key: materialKey, quantity: Number(quantity) });
      elements.quantityInput.value = '';
      elements.materialSelect.value = '';
      renderOrders();
    }

    function resetSimulation() {
      state.orders = [];
      state.lastResult = null;
      renderOrders();
      
      // 결과 초기화
      elements.vehicleBreakdown.innerHTML = '';
      elements.resultMeta.innerHTML = '';
      elements.riskBadge.textContent = 'Pending';
      elements.riskBadge.style.background = '#94a3b8';
      elements.riskList.innerHTML = '';
      elements.manualBox.textContent = '현장 매뉴얼이 여기에 표시됩니다.';
      elements.manualBox.style.borderLeftColor = '#48BB78';
      elements.sequenceList.innerHTML = '';
      elements.pdfButton.disabled = true;
      
      // 시각화 초기화
      if (VisualizerEngine.canvas) {
        const ctx = VisualizerEngine.ctx;
        ctx.clearRect(0, 0, VisualizerEngine.width, VisualizerEngine.height);
        VisualizerEngine.items = [];
      }
      elements.vizEmpty.style.display = 'grid';
      if (elements.vehicleSelect) {
        elements.vehicleSelect.innerHTML = '<option value="auto">자동선택</option>';
      }
      
      // 탭 초기화
      elements.vehicleTabs.innerHTML = '';
      elements.vehicleTabs.style.display = 'none';

      showToast('입력 및 결과가 초기화되었습니다.');
    }

    /* renderDiagrams removed */

    function renderVisualizations(payload) {
      if (!VisualizerEngine.canvas) {
        VisualizerEngine.init(payload);
      } else {
        VisualizerEngine.setData(payload);
      }
      elements.vizEmpty.style.display = 'none';
    }

    function renderResults(payload) {
      const sections = payload.vehicle_sections || [];
      elements.vehicleBreakdown.innerHTML = '';
      sections.forEach((section) => {
        const row = document.createElement('div');
        row.className = 'vehicle-row';
        row.innerHTML = `
          <span>${section['차량']}</span>
          <span class="weight-chip">${fmtInt(section['팔레트수'])}</span>
          <span class="vehicle-weight">${fmtInt(section['총중량'])}kg</span>
        `;
        elements.vehicleBreakdown.appendChild(row);
      });
      const totalRow = document.createElement('div');
      totalRow.className = 'meta-row';
      totalRow.innerHTML = `<span>합계</span><span></span><span class="vehicle-total">${fmtInt(payload['총중량'])}kg</span>`;
      const costRow = document.createElement('div');
      costRow.className = 'meta-row';
      costRow.innerHTML = `<span>총 운임</span><span></span><span class="vehicle-weight">${fmtInt(payload['총운임'])}원</span>`;
      elements.resultMeta.innerHTML = '';
      elements.resultMeta.appendChild(totalRow);
      elements.resultMeta.appendChild(costRow);
      if (elements.vehicleSelect) {
        elements.vehicleSelect.innerHTML = '';
        const option = document.createElement('option');
        option.value = 'auto';
        option.textContent = payload['차량'] || '자동선택';
        elements.vehicleSelect.appendChild(option);
      }
      elements.riskBadge.textContent = payload['위험도'] || 'Pending';
      elements.riskBadge.style.background = riskColor(payload['위험도']);
      elements.manualBox.textContent = payload['현장매뉴얼'] || '현장 매뉴얼이 없습니다.';
      const manualBorder = {
        Safe: '#48BB78',
        Caution: '#EAB308',
        Danger: '#F97316',
        Critical: '#EF4444',
      }[payload['위험도']] || '#48BB78';
      elements.manualBox.style.borderLeftColor = manualBorder;
      elements.riskList.innerHTML = '';
      Object.entries(payload['항목별위험도'] || {}).forEach(([label, level]) => {
        const row = document.createElement('div');
        row.className = 'risk-row';
        row.innerHTML = `<span>${label}</span><span class="badge" style="background:${riskColor(level)}">${level}</span>`;
        elements.riskList.appendChild(row);
      });
      elements.sequenceList.innerHTML = '';
      (payload['팔레트목록'] || []).forEach((item) => {
        const row = document.createElement('div');
        row.className = 'sequence-item';
        row.innerHTML = `
          <div>
            <div><strong>${item.order}. ${item.material}</strong></div>
            <div class="sequence-meta">${item.vehicle} · ${item.unit} · ${item.qty}</div>
          </div>
          <div>${fmtInt(item.weight)}kg</div>
        `;
        elements.sequenceList.appendChild(row);
      });
      elements.pdfButton.disabled = !payload.history_id;
      if (payload.history_id) {
        elements.pdfButton.onclick = () => {
          window.location.href = `/pdf/${payload.history_id}`;
        };
      }
      renderVisualizations(payload);
      renderVehicleTabs(payload);
    }

    function renderVehicleTabs(payload) {
      const vData = payload.visualizations || {};
      const entries = Object.entries(vData);
      
      if (entries.length <= 1) {
        elements.vehicleTabs.style.display = 'none';
        return;
      }
      
      elements.vehicleTabs.style.display = 'flex';
      elements.vehicleTabs.innerHTML = '';
      
      entries.forEach(([vid, data], idx) => {
        const tab = document.createElement('div');
        tab.className = `v-tab ${idx === 0 ? 'active' : ''}`;
        tab.textContent = vid;
        tab.onclick = () => {
          // 상세 3D 엔진 업데이트
          VisualizerEngine.setData(data);
          
          // 탭 활성화 UI 처리
          const tabs = elements.vehicleTabs.querySelectorAll('.v-tab');
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          showToast(`${vid} 시각화로 전환되었습니다.`);
        };
        elements.vehicleTabs.appendChild(tab);
      });
    }

    async function runSimulation() {
      if (!state.orders.length) {
        showToast('최소 1개 자재를 추가하십시오.');
        return;
      }
      const formData = new FormData();
      state.orders.forEach((order) => {
        formData.append('material_key', order.material_key);
        formData.append('quantity[]', String(order.quantity));
      });
      elements.runButton.disabled = true;
      elements.runButton.textContent = '계산 중...';
      try {
        const response = await fetch('/run', { method: 'POST', body: formData });
        const payload = await response.json();
        if (!response.ok) {
          showToast(payload.error || '실행 중 오류가 발생했습니다.');
          return;
        }
        state.lastResult = payload;
        renderResults(payload);
        showToast('최적 배차 결과를 반영했습니다.');
      } catch (error) {
        showToast('서버 연결에 실패했습니다.');
      } finally {
        elements.runButton.disabled = false;
        elements.runButton.textContent = '최적 배차 실행';
      }
    }

    document.getElementById('addOrderButton').addEventListener('click', addOrder);
    document.getElementById('runButton').addEventListener('click', runSimulation);
    document.getElementById('resetButton').addEventListener('click', resetSimulation);
    elements.quantityInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        addOrder();
      }
    });
    document.querySelectorAll('[data-action]').forEach(button => {
      button.addEventListener('click', () => {
        const { action, val } = button.dataset;
        if (action === 'view') {
          VisualizerEngine.view = val;
          document.querySelectorAll('[data-action="view"]').forEach(btn => {
            btn.classList.toggle('active', btn === button);
            btn.style.color = btn === button ? '#fff' : 'rgba(255,255,255,0.6)';
          });
          const labelMap = { iso: 'ISO View', top: 'TOP View', side: 'SIDE View' };
          document.getElementById('viz-label').textContent = labelMap[val];
        } else if (action === 'toggle') {
          if (val === 'risk') VisualizerEngine.showRisk = !VisualizerEngine.showRisk;
          if (val === 'weight') VisualizerEngine.showWeight = !VisualizerEngine.showWeight;
          button.classList.toggle('active');
          button.style.color = button.classList.contains('active') ? '#fbbf24' : 'rgba(255,255,255,0.6)';
        } else if (action === 'filter') {
          VisualizerEngine.layerFilter = val;
          document.querySelectorAll('[data-action="filter"]').forEach(btn => {
            btn.classList.toggle('active', btn === button);
            btn.style.color = btn === button ? '#fff' : 'rgba(255,255,255,0.6)';
          });
        }
      });
    });
    document.querySelectorAll('#mobileNav button').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('#mobileNav button').forEach((node) => node.classList.toggle('active', node === button));
        const target = button.dataset.target;
        document.querySelectorAll('[data-mobile-panel]').forEach((panel) => {
          panel.classList.toggle('mobile-active', panel.dataset.mobilePanel === target);
        });
      });
    });
    renderOrders();
  </script>
</body>
</html>
