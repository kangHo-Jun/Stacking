<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>V2 Control Room - 적재 시뮬레이터</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --accent: #0284c7;
      --border: #e2e8f0;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Pretendard", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .shell {
      width: 100%;
      max-width: 600px;
      background: var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .header {
      padding: 32px;
      background: linear-gradient(135deg, var(--ink), #1e293b);
      color: white;
    }
    .header h1 { margin: 0; font-size: 1.75rem; letter-spacing: -0.02em; }
    .header p { margin: 8px 0 0; color: #94a3b8; font-size: 0.9rem; line-height: 1.5; }
    
    form { padding: 32px; }
    .row { display: grid; grid-template-columns: 1fr 120px; gap: 12px; margin-bottom: 12px; }
    label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    select, input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font: inherit;
      background: #f8fafc;
    }
    select:focus, input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
    button, .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-secondary { background: #f1f5f9; color: var(--ink); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-primary { background: var(--accent); color: white; border: none; grid-column: span 2; }
    .btn-primary:hover { background: #0369a1; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(2,132,199,0.2); }

    .flash { padding: 16px; background: #fef2f2; color: #b91c1c; border-radius: 12px; border: 1px solid #fecaca; margin-bottom: 24px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <h1>Stacking Navigator V2</h1>
      <p>출고 최적화 및 동적 안정성(COG) 시뮬레이션 시스템</p>
    </div>
    
    <form method="post" action="{{ url_for('run') }}">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="flash">⚠️ {{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <div id="order-list">
        <div class="row order-row">
          <div>
            <label>화물 자재 선택</label>
            <select name="material_key" required>
              <option value="">품목을 선택하십시오</option>
              {% for option in material_options %}
                <option value="{{ option }}">{{ option }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label>수량 (EA)</label>
            <input type="number" min="1" name="quantity" placeholder="0" required>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-secondary" type="button" id="add-order">+ 자재 추가</button>
        <a class="button btn-secondary" href="{{ url_for('history') }}">📜 실행 이력</a>
        <button class="btn-primary" type="submit">시뮬레이션 가동</button>
      </div>
    </form>
  </div>

  <template id="order-template">
    <div class="row order-row">
      <div>
        <select name="material_key" required>
          <option value="">품목을 선택하십시오</option>
          {% for option in material_options %}
            <option value="{{ option }}">{{ option }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <input type="number" min="1" name="quantity" placeholder="0" required>
      </div>
    </div>
  </template>

  <script>
    const addButton = document.getElementById('add-order');
    const orderList = document.getElementById('order-list');
    const template = document.getElementById('order-template');
    addButton.addEventListener('click', () => {
      orderList.appendChild(template.content.cloneNode(true));
    });
  </script>
</body>
</html>
